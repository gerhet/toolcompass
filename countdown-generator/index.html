<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="google-site-verification" content="ZwbquvhC72rPppjQTqD4b8wBaDw97MHKdKSgCG3LMXI" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4JVNJKQYCG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4JVNJKQYCG');
    </script>
    
    <title>Event Countdown | ToolCompass</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <header class="bg-white shadow-sm py-4"><div class="container mx-auto px-4"><a href="/" class="text-blue-600 font-bold">← Back</a></div></header>
    <main class="container mx-auto px-4 py-10 max-w-xl text-center">
        <h1 class="text-3xl font-extrabold mb-6">Countdown Generator</h1>
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <input type="date" id="eventDate" class="w-full p-4 border rounded-xl mb-4 focus:ring-2 focus:ring-red-500 outline-none">
            <button onclick="startCountdown()" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 transition">Start Countdown</button>
            <div id="display" class="hidden mt-8">
                <p class="text-xs font-bold text-gray-400 uppercase mb-2">Time Remaining</p>
                <div id="timer" class="text-4xl font-black text-red-600 tracking-tighter"></div>
            </div>
        </div>
    </main>
    <script>
        function startCountdown() {
            const target = new Date(document.getElementById('eventDate').value).getTime();
            if (isNaN(target)) return;
            document.getElementById('display').classList.remove('hidden');
            setInterval(() => {
                const now = new Date().getTime();
                const dist = target - now;
                const days = Math.floor(dist / (1000 * 60 * 60 * 24));
                const hours = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('timer').innerText = `${days}d ${hours}h left`;
            }, 1000);
        }
    </script>
</body>
</html>
