<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator | ToolCompass</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <header class="bg-white shadow-sm py-4"><div class="container mx-auto px-4"><a href="/" class="text-blue-600 font-bold">← Back</a></div></header>
    <main class="container mx-auto px-4 py-10 max-w-xl text-center">
        <h1 class="text-3xl font-extrabold mb-6">Age Calculator</h1>
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <input type="date" id="birthDate" class="w-full p-4 border rounded-xl mb-4 focus:ring-2 focus:ring-indigo-500 outline-none">
            <button onclick="calculateAge()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">Calculate Age</button>
            <div id="ageResult" class="hidden mt-8 grid grid-cols-3 gap-4">
                <div class="bg-indigo-50 p-4 rounded-xl"><p class="text-xs font-bold text-indigo-400">YEARS</p><p id="resYears" class="text-2xl font-black text-indigo-600"></p></div>
                <div class="bg-indigo-50 p-4 rounded-xl"><p class="text-xs font-bold text-indigo-400">MONTHS</p><p id="resMonths" class="text-2xl font-black text-indigo-600"></p></div>
                <div class="bg-indigo-50 p-4 rounded-xl"><p class="text-xs font-bold text-indigo-400">DAYS</p><p id="resDays" class="text-2xl font-black text-indigo-600"></p></div>
            </div>
        </div>
    </main>
    <script>
        function calculateAge() {
            const birth = new Date(document.getElementById('birthDate').value);
            const now = new Date();
            if (isNaN(birth)) return;
            const diff = now - birth;
            document.getElementById('resYears').innerText = Math.floor(diff / (1000 * 60 * 60 * 24 * 365.25));
            document.getElementById('resMonths').innerText = Math.floor(diff / (1000 * 60 * 60 * 24 * 30.44));
            document.getElementById('resDays').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('ageResult').classList.remove('hidden');
        }
    </script>
</body>
</html>
