<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-IDENTITY | Ultimate Naming Engine | ToolCompass</title>
    
    <meta name="google-site-verification" content="ZwbquvhC72rPppjQTqD4b8wBaDw97MHKdKSgCG3LMXI" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4JVNJKQYCG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4JVNJKQYCG');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@900&display=swap');
        
        :root { --accent: #2563eb; }
        body { font-family: 'Space Grotesk', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .font-heavy { font-family: 'Outfit', sans-serif; }
        
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .name-card { transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; position: relative; overflow: hidden; }
        .name-card:hover { transform: translateY(-5px) scale(1.02); border-color: var(--accent); box-shadow: 0 10px 40px -10px rgba(37, 99, 235, 0.5); }
        
        .scanline { width: 100%; height: 2px; background: rgba(37, 99, 235, 0.2); position: absolute; animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #9333ea, #3b82f6); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="scanline"></div>

    <header class="p-6 border-b border-white/5 relative z-50 glass">
        <div class="container mx-auto flex justify-between items-center">
            
            <a href="/" class="flex items-center group space-x-3">
                <div class="w-10 h-10 bg-blue-600/10 border border-blue-500/30 rounded-xl flex items-center justify-center text-blue-500 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300 shadow-lg shadow-blue-500/10">
                    <span class="text-xl font-bold group-hover:-translate-x-1 transition-transform">←</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-blue-600 font-bold text-xs uppercase tracking-widest leading-none mb-1">Back</span>
                    <span class="text-slate-500 text-[10px] font-black uppercase tracking-tighter">to ToolCompass</span>
                </div>
            </a>

            <div class="hidden md:flex flex-col items-end">
                <div id="vault-count" class="text-[10px] font-bold text-blue-400 bg-blue-500/10 px-4 py-1.5 rounded-full border border-blue-500/20 tracking-[0.2em] uppercase">
                    Vault_Buffer: 0
                </div>
            </div>

        </div>
    </header>

    <main class="container mx-auto px-4 py-16 relative z-10">
        <div class="max-w-4xl mx-auto text-center mb-16">
            <h1 class="text-6xl md:text-8xl font-heavy mb-4 tracking-tighter leading-none uppercase italic">The <span class="gradient-text">Omega</span> Engine</h1>
            <p class="text-slate-400 text-lg uppercase tracking-[0.3em] font-light">Multipass Identity Combinator // v.9.0 Final</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="glass p-8 rounded-[2rem] space-y-8">
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-blue-500 mb-4 block">Select Universe</label>
                        <select id="category" class="w-full bg-slate-900/50 border border-white/10 p-4 rounded-xl font-bold outline-none focus:border-blue-500 transition">
                            <option value="fantasy">Epic High Fantasy</option>
                            <option value="corp">Global Tech Conglomerate</option>
                            <option value="cyber">Cybernetic / Hacknet</option>
                            <option value="modern">Modern Bio-Identity</option>
                        </select>
                    </div>

                    <div class="space-y-3">
                        <label class="text-[10px] font-black uppercase tracking-widest text-blue-500 block">Matrix Parameters</label>
                        <label class="flex justify-between items-center group cursor-pointer">
                            <span class="text-sm text-slate-400 group-hover:text-white transition">Honorifics</span>
                            <input type="checkbox" id="useTitle" class="w-5 h-5 accent-blue-600">
                        </label>
                        <label class="flex justify-between items-center group cursor-pointer">
                            <span class="text-sm text-slate-400 group-hover:text-white transition">Surnames</span>
                            <input type="checkbox" id="useLast" checked class="w-5 h-5 accent-blue-600">
                        </label>
                        <label class="flex justify-between items-center group cursor-pointer">
                            <span class="text-sm text-slate-400 group-hover:text-white transition">Ancient Traits</span>
                            <input type="checkbox" id="useTrait" class="w-5 h-5 accent-blue-600">
                        </label>
                    </div>

                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-blue-500 mb-4 block">Sequence Length</label>
                        <div class="flex bg-slate-900 rounded-xl p-1 border border-white/5">
                            <button onclick="setLen('short')" id="btn-short" class="flex-1 py-2 text-xs font-bold rounded-lg transition">Short</button>
                            <button onclick="setLen('med')" id="btn-med" class="flex-1 py-2 text-xs font-bold rounded-lg bg-blue-600 transition">Med</button>
                            <button onclick="setLen('long')" id="btn-long" class="flex-1 py-2 text-xs font-bold rounded-lg transition">Long</button>
                        </div>
                    </div>

                    <button onclick="generate()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-heavy py-5 rounded-2xl shadow-2xl shadow-blue-500/20 transition active:scale-95 uppercase tracking-widest text-xl italic">
                        Initialize Matrix
                    </button>
                </div>

                <div id="vault-area" class="glass p-6 rounded-[2rem] hidden">
                    <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-4 flex justify-between">
                        <span>Secured Vault</span>
                        <button onclick="clearVault()" class="text-red-400 hover:text-red-300">Wipe</button>
                    </h3>
                    <div id="vault-list" class="space-y-2 max-h-48 overflow-y-auto"></div>
                </div>
            </div>

            <div class="lg:col-span-8 glass p-8 rounded-[2rem] min-h-[600px] relative overflow-hidden">
                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center opacity-20">
                    <div class="text-9xl mb-4">⚙️</div>
                    <p class="font-heavy uppercase tracking-[0.5em]">Waiting for Input...</p>
                </div>
                <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 relative z-10"></div>
            </div>

        </div>
    </main>

    <script>
        let currentLen = 'med';
        let vault = JSON.parse(localStorage.getItem('tc_vault') || '[]');
        updateVaultUI();

        const db = {
            titles: ["Lord", "High Archon", "Saint", "Agent", "Overlord", "Grandmaster", "Elder", "Baron", "Chief", "Prime", "Dr.", "Professor", "Exarch", "Void-Walker"],
            traits: ["the Eternal", "the Ghost-Bearer", "the Silent", "the Feather-Bearer", "the Melancholic", "the Radiant", "the Unforgiven", "the Iron-Willed", "the Catalyst", "the Void-Born"],
            fantasy: {
                p: ["Thal", "Elow", "Kael", "Vael", "Zor", "Lir", "Mor", "Syl", "Fao", "Xan", "Aer", "Bael", "Cael", "Dra", "Eld", "Ghal"],
                m: ["an", "en", "in", "ar", "er", "ir", "al", "el", "il", "dra", "morn", "vale", "ryn", "dil", "bor"],
                s: ["dor", "thas", "rond", "ius", "ael", "gath", "orn", "ald", "wyn", "mir", "ros", "zak", "duin", "hal", "vale"]
            },
            corp: {
                p: ["Neo", "Omni", "Velo", "Aero", "Strat", "Quant", "Nexus", "Flux", "Core", "Prime", "Zenth", "Apex", "Nova", "Tera"],
                m: ["stream", "logic", "point", "base", "grid", "wire", "link", "stack", "flow", "bridge", "scale", "wise", "zone"],
                s: ["ly", "ify", "io", "ora", "ix", "on", "ic", "is", "Labs", "Group", "Systems", "Ventures", "Dynamics", "Collective"]
            },
            cyber: {
                p: ["Neon", "Cyber", "Synth", "Byte", "Glitch", "Vector", "Static", "Chrome", "Null", "Proxy", "Net", "Code", "Link", "Grid"],
                m: ["-X-", " Zero ", " Delta ", " Prime ", " MK ", " Core ", " Ghost ", " Void ", " Pulse ", " Vector "],
                s: ["Runner", "Daemon", "Vortex", "Cutter", "Slider", "Scanner", "Matrix", "Protocol", "Breaker", "Shadow", "Edge"]
            },
            modern: {
                p: ["Liam", "Noah", "Oliver", "James", "Elijah", "William", "Henry", "Lucas", "Benjamin", "Theodore", "Mateo", "Levi"],
                m: ["Alexander", "Marie", "Grace", "James", "Rose", "Edward", "Lee", "Elizabeth", "Michael", "Jane", "William", "Anne"],
                s: ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis", "Rodriguez", "Martinez", "Hernandez"]
            }
        };

        function setLen(l) {
            currentLen = l;
            ['short', 'med', 'long'].forEach(id => {
                document.getElementById('btn-'+id).classList.remove('bg-blue-600');
            });
            document.getElementById('btn-'+l).classList.add('bg-blue-600');
        }

        function generate() {
            document.getElementById('empty-state').classList.add('hidden');
            const cat = document.getElementById('category').value;
            const useTitle = document.getElementById('useTitle').checked;
            const useLast = document.getElementById('useLast').checked;
            const useTrait = document.getElementById('useTrait').checked;
            const grid = document.getElementById('grid');

            grid.innerHTML = '';
            
            for(let i = 0; i < 16; i++) {
                let parts = [];
                if(useTitle) parts.push(db.titles[Math.floor(Math.random() * db.titles.length)]);

                const p = db[cat].p[Math.floor(Math.random() * db[cat].p.length)];
                const m = db[cat].m[Math.floor(Math.random() * db[cat].m.length)];
                const s = db[cat].s[Math.floor(Math.random() * db[cat].s.length)];

                let core = currentLen === 'short' ? p+s : (currentLen === 'med' ? p+m+s : p+m+m+s);
                if(cat === 'fantasy') core = core.replace(/-/g, '');
                parts.push(core);

                if(useLast) parts.push(db[cat].s[Math.floor(Math.random() * db[cat].s.length)]);
                if(useTrait) parts.push(db.traits[Math.floor(Math.random() * db.traits.length)]);

                const name = parts.join(cat === 'cyber' ? '' : ' ');
                createCard(name);
            }
        }

        function createCard(name) {
            const card = document.createElement('div');
            const hue = Math.floor(Math.random() * 360);
            card.className = "name-card glass p-6 rounded-2xl border-l-4";
            card.style.borderLeftColor = `hsl(${hue}, 70%, 50%)`;
            
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[10px] text-slate-500 uppercase font-black mb-1 tracking-widest">ID-MATCH</p>
                        <h4 class="text-xl font-bold text-white tracking-tight">${name}</h4>
                    </div>
                    <button onclick="addToVault('${name}')" class="text-slate-600 hover:text-blue-400 transition text-xl">★</button>
                </div>
                <div class="mt-4 flex space-x-2">
                    <div class="h-1 flex-1 bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-500/50" style="width: ${Math.random()*100}%"></div>
                    </div>
                </div>
            `;
            
            card.onclick = (e) => {
                if(e.target.tagName === 'BUTTON') return;
                navigator.clipboard.writeText(name);
                const toast = document.createElement('div');
                toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-8 py-3 rounded-full font-black uppercase tracking-widest text-xs animate-bounce shadow-2xl z-50";
                toast.innerText = "Identity Copied to Clipboard";
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            };
            
            document.getElementById('grid').appendChild(card);
        }

        function addToVault(name) {
            if(!vault.includes(name)) {
                vault.push(name);
                localStorage.setItem('tc_vault', JSON.stringify(vault));
                updateVaultUI();
            }
        }

        function clearVault() {
            vault = [];
            localStorage.setItem('tc_vault', JSON.stringify(vault));
            updateVaultUI();
        }

        function updateVaultUI() {
            const list = document.getElementById('vault-list');
            const area = document.getElementById('vault-area');
            const count = document.getElementById('vault-count');
            
            if(vault.length > 0) area.classList.remove('hidden');
            else area.classList.add('hidden');
            
            count.innerText = `Vault: ${vault.length}`;
            list.innerHTML = vault.map(name => `
                <div class="flex justify-between items-center bg-white/5 p-2 px-3 rounded-lg text-xs font-bold border border-white/5">
                    <span class="truncate mr-2">${name}</span>
                    <button onclick="removeFromVault('${name}')" class="text-red-500 hover:scale-125 transition">×</button>
                </div>
            `).join('');
        }

        function removeFromVault(name) {
            vault = vault.filter(n => n !== name);
            localStorage.setItem('tc_vault', JSON.stringify(vault));
            updateVaultUI();
        }
    </script>
</body>
</html>
