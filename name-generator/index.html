<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI Name Engine | 10M+ Identities | ToolCompass</title>
    
    <meta name="google-site-verification" content="ZwbquvhC72rPppjQTqD4b8wBaDw97MHKdKSgCG3LMXI" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4JVNJKQYCG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4JVNJKQYCG');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .name-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .name-card:hover { transform: scale(1.03); z-index: 10; }
        .gradient-text { background: linear-gradient(90deg, #2563eb, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 py-4">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="/" class="flex items-center space-x-2 group">
                <span class="text-2xl group-hover:rotate-12 transition-transform">🧭</span>
                <span class="font-black text-xl tracking-tighter uppercase">ToolCompass<span class="text-blue-600">.org</span></span>
            </a>
            <div class="hidden md:block text-[10px] font-black bg-slate-900 text-white px-3 py-1 rounded-full uppercase tracking-widest">
                Triple-Core Engine v4.0
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-16 max-w-5xl">
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-black mb-6 tracking-tight uppercase leading-none">The <span class="gradient-text">Ultimate</span><br>Naming Matrix.</h1>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto font-medium">Outperforming standard generators with a combinatorial logic of <span class="text-blue-600 font-bold">10,000,000+</span> unique results. Perfect for brands, lore, and global identities.</p>
        </div>

        <div class="bg-white p-2 rounded-[3rem] shadow-2xl shadow-blue-200/50 border border-slate-100">
            <div class="p-8 md:p-12">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-blue-600 uppercase tracking-widest ml-1">Algorithm</label>
                        <select id="category" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none font-bold transition-all">
                            <option value="corp">Fortune 500 & Tech</option>
                            <option value="fantasy">High-Lore Fantasy</option>
                            <option value="modern">Global Modern Human</option>
                            <option value="gaming">E-Sports & Gaming</option>
                            <option value="scientific">Scientific & Bio-Tech</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-black text-blue-600 uppercase tracking-widest ml-1">Density</label>
                        <select id="quantity" class="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl outline-none font-bold transition-all">
                            <option value="20">Generate 20</option>
                            <option value="50">Generate 50</option>
                            <option value="100">Generate 100 (Instant)</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button onclick="generate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-500/40 transition-all active:scale-95 uppercase tracking-widest">
                            Run Matrix
                        </button>
                    </div>
                </div>

                <div id="resultArea" class="hidden">
                    <div class="flex items-center justify-between mb-6 px-2">
                        <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-400">Generated Identities</h3>
                        <span id="counter" class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded"></span>
                    </div>
                    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const db = {
            corp: {
                p: ["Neo", "Omni", "Velo", "Aero", "Strat", "Quant", "Nexus", "Flux", "Core", "Prime", "Zenth", "Apex", "Nova", "Tera", "Alpha", "Global", "Intelli", "Meta", "Synchro", "Opti", "Dynamo", "Vertex", "Solvo", "Kineti", "Aura"],
                m: ["stream", "logic", "point", "base", "grid", "wire", "link", "stack", "flow", "bridge", "scale", "wise", "zone", "port", "path", "view", "deck", "vault", "space", "node", "shift", "pulse", "mark", "trace", "mode"],
                s: ["ly", "ify", "io", "ora", "ix", "on", "ic", "is", "it", "um", "as", "ar", "en", "ex", "os", "Labs", "Group", "Systems", "Ventures", "Global", "Solutions", "Dynamics", "HQ", "Partners", "Collective"]
            },
            fantasy: {
                p: ["Thal", "Elow", "Kael", "Vael", "Zor", "Lir", "Mor", "Syl", "Fao", "Xan", "Aer", "Bael", "Cael", "Dra", "Eld", "Ghal", "Hald", "Iril", "Jal", "Khor", "Luth", "Mith", "Nyth", "Orel", "Pha", "Quen", "Rhal", "Saur", "Taur", "Uld", "Val", "Wyr", "Xyl", "Yar", "Zan"],
                m: ["-a-", "-e-", "-i-", "-o-", "-u-", "an", "en", "in", "on", "un", "ar", "er", "ir", "or", "ur", "al", "el", "il", "ol", "ul", "as", "es", "is", "os", "us", "dra", "morn", "vale", "thir", "vail"],
                s: ["dor", "thas", "rond", "ius", "ael", "gath", "orn", "ald", "wyn", "mir", "ryn", "dil", "bor", "fin", "lon", "ros", "zak", "duin", "hal", "rem", "vale", "kin", "thor", "grim", "star", "fire"]
            },
            modern: {
                p: ["Liam", "Noah", "Oliver", "James", "Elijah", "William", "Henry", "Lucas", "Benjamin", "Theodore", "Mateo", "Levi", "Sebastian", "Daniel", "Jack", "Emma", "Olivia", "Ava", "Sophia", "Isabella", "Mia", "Amelia", "Harper", "Evelyn", "Luna"],
                m: ["Alexander", "Marie", "Grace", "James", "Rose", "Edward", "Lee", "Elizabeth", "Michael", "Jane", "William", "Anne", "Thomas", "Victoria", "David", "Catherine", "Joseph", "Lynn", "Arthur", "Mary", "Xavier", "Skye", "Kai", "Rain", "River"],
                s: ["Smith", "Johnson", "Williams", "Brown", "Jones", "Garcia", "Miller", "Davis", "Rodriguez", "Martinez", "Hernandez", "Lopez", "Gonzalez", "Wilson", "Anderson", "Thomas", "Taylor", "Moore", "Jackson", "Martin", "Lee", "Perez", "Thompson", "White", "Harris"]
            },
            gaming: {
                p: ["Xx_", "PvP_", "Shadow", "Ghost", "Alpha", "Dark", "Toxic", "Elite", "Pro_", "Cyber", "Fatal", "Nova", "Glitch", "Null", "Void", "Iron", "Storm", "Frost", "Rapid", "Zenith", "Omega", "Rogue", "Hyper", "Velo", "Pixel"],
                m: ["Slayer", "Sniper", "Hunter", "Reaper", "Knight", "King", "God", "Demon", "Wolf", "Beast", "Titan", "Pilot", "Ace", "Bot", "Hacker", "Viper", "Dragon", "Storm", "Blaze", "Raven"],
                s: ["_YT", "_LP", "99", "77", "X", "_Vortex", "_Prime", "_Zero", "HD", "Gaming", "Modz", "Legacy", "Origin", "Evolution", "Striker"]
            },
            scientific: {
                p: ["Bio", "Neuro", "Cryo", "Gen", "Nano", "Quantum", "Atmo", "Hydro", "Litho", "Astro", "Chem", "Electro", "Iso", "Macro", "Micro", "Pharma", "Syntho", "Tele", "Thermo", "Xeno"],
                m: ["-core-", "-cell-", "-gen-", "-tech-", "-link-", "-node-", "-base-", "-plex-", "-sync-", "-sphere-", "-lab-", "-zyme-", "-phage-", "-ome-", "-tron-"],
                s: ["Alpha", "Beta", "Gamma", "Delta", "Epsilon", "Zeta", "Sigma", "Omega", "Prime", "v2", "X-1", "01", "Final", "System", "Module"]
            }
        };

        function generate() {
            const cat = document.getElementById('category').value;
            const qty = parseInt(document.getElementById('quantity').value);
            const grid = document.getElementById('grid');
            const area = document.getElementById('resultArea');
            const counter = document.getElementById('counter');

            grid.innerHTML = '';
            area.classList.remove('hidden');
            counter.innerText = `${qty} Units Computed`;

            for(let i = 0; i < qty; i++) {
                const p = db[cat].p[Math.floor(Math.random() * db[cat].p.length)];
                const m = db[cat].m[Math.floor(Math.random() * db[cat].m.length)];
                const s = db[cat].s[Math.floor(Math.random() * db[cat].s.length)];
                
                let name = "";
                if (cat === 'modern') name = `${p} ${m} ${s}`;
                else if (cat === 'gaming') name = `${p}${m}${s}`;
                else if (cat === 'fantasy') name = (p + m + s).replace(/-/g, '');
                else if (cat === 'scientific') name = p + m + s;
                else name = p + m + s;

                const card = document.createElement('div');
                card.className = "name-card group relative bg-white border border-slate-200 p-4 rounded-2xl font-bold text-slate-700 hover:border-blue-500 hover:bg-blue-50 cursor-pointer transition-all text-center";
                card.innerHTML = `
                    <span class="relative z-10 text-sm">${name}</span>
                    <span class="opacity-0 group-hover:opacity-100 absolute inset-0 bg-blue-600 text-white text-[9px] flex items-center justify-center font-black transition-opacity uppercase tracking-widest rounded-2xl">Copy to Clipboard</span>
                `;
                
                card.onclick = () => {
                    navigator.clipboard.writeText(name);
                    const original = card.innerHTML;
                    card.innerHTML = `<span class="text-blue-600 uppercase text-[10px]">Copied Success</span>`;
                    setTimeout(() => card.innerHTML = original, 800);
                };

                grid.appendChild(card);
            }
        }
    </script>
</body>
</html>
