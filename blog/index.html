<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#030712">
    <title>Blog – ToolCompass.org | Ratgeber & Wissen</title>
    <meta name="description" content="ToolCompass Blog: Praktische Ratgeber zu BMI, Promillegrenzen, Passwortsicherheit, QR-Codes und mehr. Verständlich, fundiert, werbefrei.">
    <link rel="canonical" href="https://toolcompass.org/blog/">
    <link rel="preload" href="/styles.css" as="style">
    <meta property="og:title" content="Blog – ToolCompass.org | Ratgeber & Wissen">
    <meta property="og:description" content="Praktische Ratgeber zu BMI, Promillegrenzen, Passwortsicherheit & mehr.">
    <meta property="og:url" content="https://toolcompass.org/blog/">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .blog-grid{display:grid;gap:1.5rem;margin-bottom:3rem}
        @media(min-width:768px){.blog-grid{grid-template-columns:1fr 1fr}}
        .blog-card{background:var(--card-bg);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);padding:2rem;border-radius:20px;border:1px solid var(--border);text-decoration:none;color:inherit;transition:all 0.35s cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden}
        .blog-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);box-shadow:0 25px 50px -12px rgba(0,0,0,0.6)}
        .blog-card .blog-tag{display:inline-block;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;padding:0.25rem 0.7rem;border-radius:99px;margin-bottom:1rem}
        .blog-card .blog-tag.health{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.15)}
        .blog-card .blog-tag.security{background:rgba(99,102,241,0.12);color:#818cf8;border:1px solid rgba(99,102,241,0.15)}
        .blog-card .blog-tag.tech{background:rgba(6,182,212,0.12);color:#22d3ee;border:1px solid rgba(6,182,212,0.15)}
        .blog-card .blog-title{font-size:1.3rem;font-weight:700;color:white;margin-bottom:0.5rem;letter-spacing:-0.01em;line-height:1.3}
        .blog-card .blog-excerpt{font-size:0.9rem;color:var(--text-muted);line-height:1.6;margin-bottom:1rem}
        .blog-card .blog-meta{font-size:0.75rem;color:var(--text-muted);display:flex;gap:1rem}
        .blog-card .blog-read{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.85rem;font-weight:600;color:var(--accent-secondary);margin-top:0.5rem;transition:gap 0.2s}
        .blog-card:hover .blog-read{gap:0.7rem}
        .empty-state{text-align:center;padding:4rem 2rem;color:var(--text-muted)}
        .empty-state h2{color:white;font-size:1.5rem;margin-bottom:0.5rem}
        .featured-card{grid-column:1/-1;background:linear-gradient(135deg,rgba(99,102,241,0.06),rgba(6,182,212,0.04));border-color:rgba(99,102,241,0.2)}
        .featured-card .blog-tag{background:rgba(99,102,241,0.15);color:#a5b4fc}
    </style>
    <script src="/assets/js/consent.js"></script>
</head>
<body>
    <div class="bg-glows"><div class="glow-1"></div><div class="glow-2"></div></div>
    <div class="container">
        <nav><a href="/" aria-label="Zurück"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"></polyline></svg> Zurück</a></nav>
        <header>
            <div class="top-badge"><svg class="icon" style="width:14px;height:14px;" aria-hidden="true"><use href="/assets/icons/lucide-sprite.svg#newspaper"></use></svg> Blog</div>
            <h1>ToolCompass <span>Blog</span></h1>
            <p class="subtitle">Praktische Ratgeber, Hintergrundwissen und Tipps zu unseren Tools – verständlich aufbereitet, immer werbefrei.</p>
        </header>
        <main>
            <div class="blog-grid" id="blogGrid">
                <!-- Artikel werden per JS eingefügt -->
            </div>
        </main>
    </div>
    <footer><div class="footer-links"><a href="/">Startseite</a><a href="/about.html">Über uns</a><a href="/impressum/index.html" lang="de">Impressum</a><a href="/datenschutz/" lang="de">Datenschutz</a></div><div class="footer-copy">&copy; <span id="year"></span> ToolCompass.org</div></footer>
    <script defer>
        (function() {
            'use strict';
            document.getElementById('year').textContent = new Date().getFullYear();

            var articles = [
                {
                    title: 'BMI verstehen – Was der Body Mass Index wirklich aussagt',
                    excerpt: 'Der BMI ist der bekannteste Wert zur Gewichtsklassifikation. Doch was sagt er wirklich aus? Wir erklären die Formel, die Grenzen und worauf du achten solltest.',
                    tag: 'Gesundheit',
                    tagClass: 'health',
                    date: 'Juni 2026',
                    readTime: '8 Min.',
                    url: '/blog/bmi-verstehen-guide/',
                    featured: true
                }
            ];

            var grid = document.getElementById('blogGrid');
            articles.forEach(function(a) {
                var card = document.createElement('a');
                card.href = a.url;
                card.className = 'blog-card' + (a.featured ? ' featured-card' : '');
                card.innerHTML =
                    '<span class="blog-tag ' + a.tagClass + '">' + a.tag + '</span>' +
                    '<div class="blog-title">' + a.title + '</div>' +
                    '<div class="blog-excerpt">' + a.excerpt + '</div>' +
                    '<div class="blog-meta"><span>' + a.date + '</span><span>' + a.readTime + ' Lesezeit</span></div>' +
                    '<div class="blog-read">Weiterlesen →</div>';
                grid.appendChild(card);
            });
        })();
    </script>
</body>
</html>
