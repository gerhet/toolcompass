    <style>
        .tool-interface{background:var(--card-bg);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);padding:2.5rem;border-radius:24px;border:1px solid var(--border);margin-bottom:3rem}
        .form-group{margin-bottom:1.5rem}
        .form-group label{display:block;font-weight:600;margin-bottom:0.5rem;font-size:0.9rem;color:var(--text-main)}
        .form-group input,.form-group select{width:100%;padding:1rem;background:rgba(3,7,18,0.6);border:1px solid var(--border);border-radius:12px;color:white;font-family:inherit;font-size:1rem;outline:none;transition:border-color 0.2s;box-sizing:border-box}
        .form-group input:focus,.form-group select:focus{border-color:var(--accent-primary);box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
        .form-group select option{background:var(--bg-dark);color:white}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
        @media(max-width:600px){.form-row{grid-template-columns:1fr;gap:0}}
        .btn-group{display:flex;gap:1rem;flex-wrap:wrap;margin-top:1rem}
        .btn-primary{background:linear-gradient(135deg,var(--accent-primary),#4f46e5);color:white;padding:1rem 2rem;border-radius:12px;font-weight:700;cursor:pointer;border:none;font-size:1rem;display:inline-flex;align-items:center;gap:0.5rem;transition:all 0.3s;box-shadow:0 4px 15px rgba(99,102,241,0.3)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(99,102,241,0.4)}
        .converter-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:1rem;align-items:end;margin-top:0.5rem}
        .converter-grid .swap-btn{background:rgba(99,102,241,0.1);border:1px solid var(--border);color:var(--accent-secondary);border-radius:12px;padding:0.8rem;cursor:pointer;transition:all 0.2s;font-size:1.2rem;display:flex;align-items:center;justify-content:center}
        .converter-grid .swap-btn:hover{background:rgba(99,102,241,0.2);transform:scale(1.1)}
        .result-display{background:rgba(3,7,18,0.6);padding:1.2rem;border-radius:12px;border:1px solid var(--border);margin-top:1.5rem;text-align:center}
        .result-display .result-label{font-size:0.8rem;color:var(--text-muted)}
        .result-display .result-value{font-size:2rem;font-weight:800;color:white;letter-spacing:-0.02em}
        .result-display .result-value span{color:var(--accent-secondary)}
        .quick-convert{margin-top:2rem;padding:1rem;background:rgba(6,182,212,0.06);border:1px solid rgba(6,182,212,0.1);border-radius:12px}
        .quick-convert .qc-title{font-size:0.8rem;color:var(--accent-secondary);font-weight:600;margin-bottom:0.5rem}
        .quick-convert .qc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem}
        .quick-convert .qc-item{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:0.5rem;text-align:center;cursor:pointer;font-size:0.8rem;color:var(--text-muted);transition:all 0.2s}
        .quick-convert .qc-item:hover{background:rgba(99,102,241,0.1);color:white;border-color:var(--accent-primary)}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    </style>

<style>.tool-nav{position:sticky;top:0;z-index:100;background:rgba(3,7,18,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 1.5rem}.tool-nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0;gap:1rem}.tool-nav-logo{display:flex;align-items:center;gap:0.5rem;color:white;text-decoration:none;font-weight:700;font-size:0.95rem}.tool-nav-logo svg{color:var(--accent-secondary)}.tool-nav-links{display:flex;gap:0.3rem;overflow-x:auto}.tool-nav-link{padding:0.4rem 0.8rem;border-radius:8px;color:var(--text-muted);text-decoration:none;font-size:0.8rem;font-weight:600;white-space:nowrap}.tool-nav-link:hover{color:white;background:rgba(255,255,255,0.06)}.tool-nav-link-home{background:var(--accent-primary);color:white!important}</style></head>
<body>

        <header>
            <div class="top-badge"><svg class="icon" style="width:14px;height:14px;" aria-hidden="true"><use href="/assets/icons/lucide-sprite.svg#arrows-exchange"></use></svg> 100% Client-Side</div>
            <h1>Universal <span>Converter</span></h1>
            <p class="subtitle">Länge, Gewicht, Volumen, Temperatur, Geschwindigkeit – alles in einem Tool.</p>
        </header>
        <main>
            <div class="tool-interface">
                <div class="form-group">
                    <label for="convCategory">Kategorie</label>
                    <select id="convCategory">
                        <option value="length">📏 Länge</option>
                        <option value="weight">⚖️ Gewicht</option>
                        <option value="temperature">🌡️ Temperatur</option>
                        <option value="volume">🧪 Volumen</option>
                        <option value="speed">🚀 Geschwindigkeit</option>
                    </select>
                </div>
                <div class="converter-grid">
                    <div class="form-group">
                        <label for="fromUnit">Von</label>
                        <select id="fromUnit"></select>
                    </div>
                    <div class="swap-btn" id="swapUnits" title="Tauschen">⇄</div>
                    <div class="form-group">
                        <label for="toUnit">Nach</label>
                        <select id="toUnit"></select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="convInput">Wert</label>
                    <input type="number" id="convInput" value="1" step="any">
                </div>
                <div class="btn-group">
                    <button type="button" class="btn-primary" id="convertBtn">🔄 Umrechnen</button>
                </div>
                <div class="result-display" id="resultDisplay">
                    <div class="result-label" id="resultLabel"></div>
                    <div class="result-value"><span id="resultValue">–</span></div>
                </div>
                <div class="quick-convert">
                    <div class="qc-title">⚡ Quick-Conversions</div>
                    <div class="qc-grid" id="quickConv"></div>
                </div>
            </div>
        </main>
    </div>
    <footer><div class="footer-links"><a href="/">Startseite</a><a href="/about.html">Über uns</a><a href="/impressum/index.html" lang="de">Impressum</a><a href="/datenschutz/" lang="de">Datenschutz</a></div><div class="footer-copy">&copy; <span id="year"></span> ToolCompass.org</div></footer>
    <script defer>
        (function(){
            'use strict';
            document.getElementById('year').textContent=new Date().getFullYear();
            var cat=document.getElementById('convCategory'),from=document.getElementById('fromUnit'),to=document.getElementById('toUnit'),input=document.getElementById('convInput'),resultV=document.getElementById('resultValue'),resultL=document.getElementById('resultLabel'),qc=document.getElementById('quickConv');

            var units={
                length:{units:['mm','cm','dm','m','km','in','ft','yd','mi'],base:'m',factors:{mm:0.001,cm:0.01,dm:0.1,m:1,km:1000,in:0.0254,ft:0.3048,yd:0.9144,mi:1609.344}},
                weight:{units:['mg','g','kg','t','oz','lb'],base:'g',factors:{mg:0.001,g:1,kg:1000,t:1000000,oz:28.3495,lb:453.592}},
                temperature:{units:['°C','°F','K'],base:'°C',special:true},
                volume:{units:['ml','cl','dl','l','fl oz','gal (US)','m³'],base:'l',factors:{ml:0.001,cl:0.01,dl:0.1,l:1,'fl oz':0.0295735,'gal (US)':3.78541,'m³':1000}},
                speed:{units:['m/s','km/h','mph','kn','ft/s'],base:'m/s',factors:{'m/s':1,'km/h':0.277778,'mph':0.44704,'kn':0.514444,'ft/s':0.3048}}
            };

            var qcItems={
                length:[['1 m =','3.28 ft'],['1 km =','0.62 mi'],['1 in =','2.54 cm'],['1 ft =','30.48 cm']],
                weight:[['1 kg =','2.205 lb'],['1 oz =','28.35 g'],['1 t =','1000 kg'],['1 lb =','0.454 kg']],
                temperature:[['0°C =','32°F'],['100°C =','212°F'],['20°C =','68°F'],['-10°C =','14°F']],
                volume:[['1 l =','33.81 fl oz'],['1 gal =','3.785 l'],['1 m³ =','1000 l'],['1 cl =','10 ml']],
                speed:[['1 km/h =','0.62 mph'],['1 m/s =','3.6 km/h'],['1 kn =','1.852 km/h'],['100 km/h =','62.14 mph']]
            };

            function populateUnits(){
                var c=cat.value,data=units[c];
                from.innerHTML=data.units.map(function(u){return'<option value="'+u+'"'+(u===data.units[0]?' selected':'')+'>'+u+'</option>';}).join('');
                to.innerHTML=data.units.map(function(u){return'<option value="'+u+'"'+(u===data.units[1]?' selected':'')+'>'+u+'</option>';}).join('');
                // Quick conversions
                qc.innerHTML=(qcItems[c]||[]).map(function(q){return'<div class="qc-item"><div>'+q[0]+'</div><div style="color:white;font-weight:600">'+q[1]+'</div></div>';}).join('');
                convert();
            }

            function convert(){
                var c=cat.value,data=units[c],val=parseFloat(input.value)||0,fu=from.value,tu=to.value;
                if(data.special){
                    // Temperature special formulas
                    if(fu==='°C'&&tu==='°F'){resultV.textContent=(val*9/5+32).toFixed(2);resultL.textContent=val+' °C =';}
                    else if(fu==='°F'&&tu==='°C'){resultV.textContent=((val-32)*5/9).toFixed(2);resultL.textContent=val+' °F =';}
                    else if(fu==='°C'&&tu==='K'){resultV.textContent=(val+273.15).toFixed(2);resultL.textContent=val+' °C =';}
                    else if(fu==='K'&&tu==='°C'){resultV.textContent=(val-273.15).toFixed(2);resultL.textContent=val+' K =';}
                    else if(fu==='°F'&&tu==='K'){resultV.textContent=((val-32)*5/9+273.15).toFixed(2);resultL.textContent=val+' °F =';}
                    else if(fu==='K'&&tu==='°F'){resultV.textContent=((val-273.15)*9/5+32).toFixed(2);resultL.textContent=val+' K =';}
                    else{resultV.textContent=val;resultL.textContent=val+' '+fu+' =';}
                }else{
                    var baseVal=val*(data.factors[fu]||1);
                    var result=baseVal/(data.factors[tu]||1);
                    resultV.textContent=result.toFixed(6).replace(/\.?0+$/,'')+' '+tu;
                    resultL.textContent=val+' '+fu+' =';
                }
            }

            cat.addEventListener('change',populateUnits);
            from.addEventListener('change',convert);
            to.addEventListener('change',convert);
            input.addEventListener('input',convert);
            document.getElementById('swapUnits').addEventListener('click',function(){var t=from.value;from.value=to.value;to.value=t;convert();});
            document.getElementById('convertBtn').addEventListener('click',convert);

            popolateUnits();
        })();
    </script>
</body>
