    <style>

        .error-page .btn { display: inline-flex; padding: .8rem 1.8rem; background: linear-gradient(135deg, var(--accent-primary), #4f46e5); color: white; border-radius: 12px; font-weight: 700; text-decoration: none; align-items: center; gap: .5rem; transition: all .3s; }
        .error-page .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(99,102,241,.4); }
