<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO2 Travel Comparison | ToolCompass</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <header class="bg-white shadow-sm py-4"><div class="container mx-auto px-4"><a href="/" class="text-blue-600 font-bold">← Back</a></div></header>
    <main class="container mx-auto px-4 py-10 max-w-2xl">
        <h1 class="text-3xl font-extrabold mb-6">CO₂ Travel Comparison</h1>
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <label class="block text-sm font-medium mb-1">Distance (km)</label>
            <input type="number" id="dist" value="500" class="w-full p-3 border rounded-lg mb-6 focus:ring-2 focus:ring-green-500">
            <button onclick="calcCO2()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">Compare Footprint</button>
            <div id="res" class="hidden mt-8 space-y-4">
                <div class="p-4 bg-blue-50 rounded-lg flex justify-between"><span>🚆 Train:</span><span id="train" class="font-bold"></span></div>
                <div class="p-4 bg-gray-50 rounded-lg flex justify-between"><span>🚗 Car (Petrol):</span><span id="car" class="font-bold"></span></div>
                <div class="p-4 bg-red-50 rounded-lg flex justify-between"><span>✈️ Flight:</span><span id="plane" class="font-bold"></span></div>
            </div>
        </div>
    </main>
    <script>
        function calcCO2() {
            const d = document.getElementById('dist').value;
            document.getElementById('train').innerText = (d * 0.03).toFixed(1) + " kg CO2";
            document.getElementById('car').innerText = (d * 0.18).toFixed(1) + " kg CO2";
            document.getElementById('plane').innerText = (d * 0.25).toFixed(1) + " kg CO2";
            document.getElementById('res').classList.remove('hidden');
        }
    </script>
</body>
</html>
