<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ToolCompass | Redirecting...</title>
    <script>
        // Erkennt Browsersprache
        var userLang = navigator.language || navigator.userLanguage; 
        if (userLang.startsWith('de')) {
            window.location.href = "./de/index.html";
        } else if (userLang.startsWith('es')) {
            window.location.href = "./es/index.html";
        } else {
            // Standard: Englisch
            window.location.href = "./en/index.html";
        }
    </script>
</head>
<body style="background:#0D0D0D; color:#E8D5A3; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <p>Redirecting to ToolCompass... <br><br>
       <a href="./en/index.html" style="color:#E8D5A3;">Click here if not redirected</a>
    </p>
</body>
</html>
