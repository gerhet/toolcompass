<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Profi Briefing Generator | In 5 Schritten zum Projekt-Erfolg | ToolCompass</title>
    <meta name="description" content="Erstelle kostenlos strukturierte Projekt-Briefings für Freelancer und Kunden. Klar, präzise und bereit zum Kopieren. Optimiere deinen Workflow mit ToolCompass.">
    <meta name="keywords" content="Briefing Generator, Projektbriefing, Freelancer Tool, Lastenheft Vorlage, ToolCompass">
    
    <meta name="google-site-verification" content="ZwbquvhC72rPppjQTqD4b8wBaDw97MHKdKSgCG3LMXI" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4JVNJKQYCG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4JVNJKQYCG');
    </script>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --accent: #2563eb;
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.8);
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: var(--bg); 
            color: #f8fafc; 
            overflow-x: hidden;
        }
        
        .font-heavy { font-family: 'Outfit', sans-serif; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        .prog-seg { background: rgba(255,255,255,0.05); overflow: hidden; position: relative; }
        .prog-seg::after {
            content: ''; position: absolute; inset: 0; background: var(--accent);
            transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease;
        }
        .prog-seg.done::after { transform: scaleX(1); }
        .prog-seg.active::after { transform: scaleX(0.5); background: #3b82f6; }

        input, textarea, select {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            transition: all 0.3s;
        }
        input:focus, textarea:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
            outline: none;
        }

        .tag.selected { background: var(--accent); color: white; border-color: var(--accent); }
        .step { display: none; }
        .step.active { display: block; animation: fadeUp 0.4s ease forwards; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scanline Effekt für den Vibe */
        .scanline { 
            width: 100%; height: 2px; background: rgba(37, 99, 235, 0.05); 
            position: fixed; top: 0; left: 0; animation: scan 8s linear infinite; pointer-events: none; z-index: 100;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="scanline"></div>

    <header class="bg-white/5 border-b border-white/10 py-4 relative z-50 glass">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="/" class="flex items-center group space-x-2">
                <span class="text-blue-500 font-bold group-hover:-translate-x-1 transition-transform">←</span>
                <span class="text-blue-500 font-bold text-sm">Back</span>
            </a>
            <div class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">
                Briefing_System v1.0
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-16 max-w-2xl italic">
        
        <div class="text-center mb-12">
            <h1 class="text-5xl md:text-6xl font-heavy mb-2 tracking-tighter uppercase italic leading-none">The <span class="text-blue-500">Briefing</span> Tool</h1>
            <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] font-bold">Struktur für maximale Effizienz</p>
        </div>

        <div class="flex gap-2 mb-10" id="progress">
            <div class="prog-seg h-1 flex-1 rounded-full active" id="p0"></div>
            <div class="prog-seg h-1 flex-1 rounded-full" id="p1"></div>
            <div class="prog-seg h-1 flex-1 rounded-full" id="p2"></div>
            <div class="prog-seg h-1 flex-1 rounded-full" id="p3"></div>
            <div class="prog-seg h-1 flex-1 rounded-full" id="p4"></div>
        </div>

        <div class="glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl relative border border-white/5">
            
            <div class="step active" id="s0">
                <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-3 block">01 // Kundendaten</span>
                <h2 class="text-3xl font-heavy uppercase mb-8 italic">Wer gibt den Auftrag?</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="flex flex-col"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1 mb-1">Firma / Brand</label><input type="text" id="f-name" class="p-4 rounded-2xl" placeholder="z.B. Stark Ind."></div>
                    <div class="flex flex-col"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1 mb-1">Ansprechpartner</label><input type="text" id="f-contact" class="p-4 rounded-2xl" placeholder="Vollständiger Name"></div>
                </div>
                <div class="mt-5 flex flex-col"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1 mb-1">E-Mail Adresse</label><input type="email" id="f-email" class="p-4 rounded-2xl" placeholder="kontakt@firma.de"></div>
                <button class="w-full mt-10 bg-blue-600 p-5 rounded-2xl font-heavy uppercase tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-600/20 active:scale-95" onclick="next()">Phase 02 starten</button>
            </div>

            <div class="step" id="s1">
                <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-3 block">02 // Projekt-Kern</span>
                <h2 class="text-3xl font-heavy uppercase mb-8 italic">Was wird erschaffen?</h2>
                <div class="mb-8">
                    <label class="text-[9px] uppercase font-bold text-slate-500 mb-3 block">Projekt-Typologie</label>
                    <div class="flex flex-wrap gap-2">
                        <span class="tag border border-white/10 px-5 py-2 rounded-full text-xs font-bold cursor-pointer hover:border-blue-500 transition" onclick="toggleTag(this,'type')">Website</span>
                        <span class="tag border border-white/10 px-5 py-2 rounded-full text-xs font-bold cursor-pointer hover:border-blue-500 transition" onclick="toggleTag(this,'type')">Branding</span>
                        <span class="tag border border-white/10 px-5 py-2 rounded-full text-xs font-bold cursor-pointer hover:border-blue-500 transition" onclick="toggleTag(this,'type')">Social Media</span>
                        <span class="tag border border-white/10 px-5 py-2 rounded-full text-xs font-bold cursor-pointer hover:border-blue-500 transition" onclick="toggleTag(this,'type')">App / SaaS</span>
                    </div>
                </div>
                <div class="flex flex-col mb-6"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1 mb-1">Hauptziel des Projekts</label><textarea id="f-goal" class="p-4 rounded-2xl h-32" placeholder="Welches Problem lösen wir?"></textarea></div>
                <div class="flex justify-between items-center mt-10">
                    <button class="text-slate-500 uppercase text-[10px] font-black tracking-widest hover:text-white transition" onclick="back()">← Back</button>
                    <button class="bg-blue-600 px-10 py-4 rounded-2xl font-heavy uppercase tracking-widest hover:bg-blue-500 transition" onclick="next()">Phase 03</button>
                </div>
            </div>

            <div class="step" id="s2">
                <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-3 block">03 // Milestones</span>
                <h2 class="text-3xl font-heavy uppercase mb-8 italic">Scope & Zeit</h2>
                <div class="flex flex-col mb-6"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1 mb-1">Leistungsumfang</label><textarea id="f-scope" class="p-4 rounded-2xl h-24" placeholder="Was genau wird geliefert?"></textarea></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="flex flex-col"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1 mb-1">Deadline</label><input type="date" id="f-deadline" class="p-4 rounded-2xl text-xs"></div>
                    <div class="flex flex-col"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1 mb-1">Revisionen</label>
                        <select id="f-revisions" class="p-4 rounded-2xl outline-none appearance-none">
                            <option>1 Revision</option>
                            <option selected>2 Revisionen</option>
                            <option>3 Revisionen</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-between items-center mt-10">
                    <button class="text-slate-500 uppercase text-[10px] font-black tracking-widest hover:text-white transition" onclick="back()">← Back</button>
                    <button class="bg-blue-600 px-10 py-4 rounded-2xl font-heavy uppercase tracking-widest hover:bg-blue-500 transition" onclick="next()">Phase 04</button>
                </div>
            </div>

            <div class="step" id="s3">
                <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-3 block">04 // Rahmen</span>
                <h2 class="text-3xl font-heavy uppercase mb-8 italic">Investment</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                    <div class="flex flex-col"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1 mb-1">Budget (€)</label><input type="number" id="f-budget" class="p-4 rounded-2xl" placeholder="2500"></div>
                    <div class="flex flex-col"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1 mb-1">Zahlungsmodell</label>
                        <select id="f-payment" class="p-4 rounded-2xl outline-none appearance-none">
                            <option>50% Start / 50% Ende</option>
                            <option>100% Vorkasse</option>
                            <option>Meilenstein-basiert</option>
                        </select>
                    </div>
                </div>
                <div class="flex flex-col"><label class="text-[9px] uppercase font-bold text-slate-500 ml-1 mb-1">Referenzen / Vorbilder</label><input type="text" id="f-refs" class="p-4 rounded-2xl" placeholder="Links oder Marken..."></div>
                <div class="flex justify-between items-center mt-10">
                    <button class="text-slate-500 uppercase text-[10px] font-black tracking-widest hover:text-white transition" onclick="back()">← Back</button>
                    <button class="bg-blue-600 px-10 py-4 rounded-2xl font-heavy uppercase tracking-widest hover:bg-blue-500 transition" onclick="next()">Finalisieren</button>
                </div>
            </div>

            <div class="step" id="s4">
                <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-3 block">Zusammenfassung</span>
                <h2 class="text-3xl font-heavy uppercase mb-8 italic">Check & Copy</h2>
                <div id="summary" class="space-y-6 text-sm border-t border-white/10 pt-6"></div>
                
                <button class="w-full mt-10 bg-white text-black p-5 rounded-2xl font-heavy uppercase tracking-widest hover:bg-blue-500 hover:text-white transition shadow-xl" onclick="copyBriefing()">Briefing in Zwischenablage</button>
                <p id="copy-msg" class="text-center text-[10px] mt-4 uppercase text-blue-400 font-bold h-4"></p>
                
                <div class="flex justify-center mt-8">
                    <button class="text-slate-500 uppercase text-[9px] font-black tracking-[0.3em] hover:text-red-500 transition" onclick="resetForm()">[ System_Restart ]</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        let step = 0;
        const total = 5;
        const tags = {};

        function toggleTag(el, group) {
            tags[group] = tags[group] || [];
            if (el.classList.contains('selected')) {
                el.classList.remove('selected');
                tags[group] = tags[group].filter(t => t !== el.textContent);
            } else {
                el.classList.add('selected');
                tags[group].push(el.textContent);
            }
        }

        function setStep(n) {
            document.getElementById('s' + step).classList.remove('active');
            step = n;
            document.getElementById('s' + step).classList.add('active');

            for (let i = 0; i < total; i++) {
                const seg = document.getElementById('p' + i);
                if(seg) seg.className = 'prog-seg h-1 flex-1 rounded-full' + (i < step ? ' done' : i === step ? ' active' : '');
            }
            if (step === 4) buildSummary();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function next() { if (step < total - 1) setStep(step + 1); }
        function back() { if (step > 0) setStep(step - 1); }

        function val(id) {
            const el = document.getElementById(id);
            return el ? (el.value.trim() || '—') : '—';
        }

        function buildSummary() {
            const sections = [
                { title: 'Kunde', data: [val('f-name'), val('f-contact'), val('f-email')] },
                { title: 'Projekt', data: ['Typ: ' + (tags['type'] || []).join(', '), 'Ziel: ' + val('f-goal')] },
                { title: 'Rahmenbedingungen', data: ['Umfang: ' + val('f-scope'), 'Deadline: ' + val('f-deadline'), 'Revisionen: ' + val('f-revisions')] },
                { title: 'Finanzielles', data: ['Budget: € ' + val('f-budget'), 'Zahlung: ' + val('f-payment')] }
            ];

            document.getElementById('summary').innerHTML = sections.map(s => `
                <div class="group">
                    <div class="text-blue-500 text-[10px] font-black uppercase mb-2 tracking-widest opacity-70">${s.title}</div>
                    <div class="text-slate-200 border-l-2 border-white/5 pl-4 py-1 group-hover:border-blue-500 transition-colors">
                        ${s.data.map(d => `<div class="mb-1">${d}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function copyBriefing() {
            const text = `=== PROJEKT BRIEFING ===\n\n` + 
                         `KUNDE: ${val('f-name')} (${val('f-contact')})\n` +
                         `ZIEL: ${val('f-goal')}\n` +
                         `UMFANG: ${val('f-scope')}\n` +
                         `DEADLINE: ${val('f-deadline')}\n` +
                         `BUDGET: € ${val('f-budget')}`;
            
            navigator.clipboard.writeText(text).then(() => {
                const msg = document.getElementById('copy-msg');
                msg.textContent = "✓ Briefing gesichert & bereit zum Senden";
                setTimeout(() => msg.textContent = "", 3000);
            });
        }

        function resetForm() {
            if(confirm('Möchtest du das aktuelle Briefing wirklich löschen?')) {
                location.reload();
            }
        }
    </script>
</body>
</html>
