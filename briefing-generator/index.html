<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="google-site-verification" content="ZwbquvhC72rPppjQTqD4b8wBaDw97MHKdKSgCG3LMXI" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4JVNJKQYCG"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-4JVNJKQYCG');
  </script>
  
  <title>Briefing Generator | ToolCompass</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Outfit:wght@900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --accent: #2563eb;
      --bg: #020617; /* Passend zu X-IDENTITY */
      --card: rgba(15, 23, 42, 0.8);
    }

    body { 
      font-family: 'Space Grotesk', sans-serif; 
      background: var(--bg); 
      color: #f8fafc; 
    }
    
    .font-heavy { font-family: 'Outfit', sans-serif; }
    .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    
    /* Fortschrittsbalken-Animation */
    .prog-seg { background: rgba(255,255,255,0.05); overflow: hidden; position: relative; }
    .prog-seg::after {
      content: ''; position: absolute; inset: 0; background: var(--accent);
      transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease;
    }
    .prog-seg.done::after { transform: scaleX(1); }
    .prog-seg.active::after { transform: scaleX(0.5); background: #3b82f6; }

    /* Inputs Styling */
    input, textarea, select {
      background: rgba(0,0,0,0.2) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      color: white !important;
      transition: all 0.3s;
    }
    input:focus, textarea:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    .tag.selected { background: var(--accent); color: white; border-color: var(--accent); }
    
    .step { display: none; }
    .step.active { display: block; animation: fadeUp 0.4s ease forwards; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="min-h-screen">

  <header class="bg-white/5 border-b border-white/10 py-4 relative z-50 glass">
    <div class="container mx-auto px-4 flex justify-between items-center">
        <a href="/" class="flex items-center group space-x-2">
            <span class="text-blue-500 font-bold group-hover:-translate-x-1 transition-transform">←</span>
            <span class="text-blue-500 font-bold text-sm">Back</span>
        </a>
        <div class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">
            Briefing_System v1.0
        </div>
    </div>
  </header>

  <main class="container mx-auto px-4 py-12 max-w-2xl italic">
    
    <div class="text-center mb-10">
        <h1 class="text-4xl md:text-5xl font-heavy mb-2 tracking-tighter uppercase italic">The <span class="text-blue-500">Briefing</span> Tool</h1>
        <p class="text-slate-500 text-xs uppercase tracking-[0.3em]">Struktur für deine Projekte</p>
    </div>

    <div class="flex gap-2 mb-8" id="progress">
      <div class="prog-seg h-1 flex-1 rounded-full active" id="p0"></div>
      <div class="prog-seg h-1 flex-1 rounded-full" id="p1"></div>
      <div class="prog-seg h-1 flex-1 rounded-full" id="p2"></div>
      <div class="prog-seg h-1 flex-1 rounded-full" id="p3"></div>
      <div class="prog-seg h-1 flex-1 rounded-full" id="p4"></div>
    </div>

    <div class="glass rounded-[2rem] p-8 md:p-10 shadow-2xl relative overflow-hidden">
      
      <div class="step active" id="s0">
        <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-2 block">Phase 01</span>
        <h2 class="text-2xl font-heavy uppercase mb-6">Wer ist der Kunde?</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col"><label class="text-[10px] uppercase ml-1 mb-1">Firma</label><input type="text" id="f-name" class="p-3 rounded-xl outline-none" placeholder="z.B. Stark Ind."></div>
          <div class="flex flex-col"><label class="text-[10px] uppercase ml-1 mb-1">Kontakt</label><input type="text" id="f-contact" class="p-3 rounded-xl outline-none" placeholder="Name"></div>
        </div>
        <button class="w-full mt-8 bg-blue-600 p-4 rounded-xl font-heavy uppercase tracking-widest hover:bg-blue-500 transition" onclick="next()">Weiter</button>
      </div>

      <div class="step" id="s1">
        <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-2 block">Phase 02</span>
        <h2 class="text-2xl font-heavy uppercase mb-6">Das Projekt</h2>
        <div class="mb-6">
          <label class="text-[10px] uppercase mb-2 block">Kategorie</label>
          <div class="flex flex-wrap gap-2">
            <span class="tag border border-white/10 px-4 py-2 rounded-full text-xs cursor-pointer hover:border-blue-500" onclick="toggleTag(this,'type')">Website</span>
            <span class="tag border border-white/10 px-4 py-2 rounded-full text-xs cursor-pointer hover:border-blue-500" onclick="toggleTag(this,'type')">Branding</span>
            <span class="tag border border-white/10 px-4 py-2 rounded-full text-xs cursor-pointer hover:border-blue-500" onclick="toggleTag(this,'type')">Social Media</span>
            <span class="tag border border-white/10 px-4 py-2 rounded-full text-xs cursor-pointer hover:border-blue-500" onclick="toggleTag(this,'type')">Video</span>
          </div>
        </div>
        <div class="flex flex-col mb-4"><label class="text-[10px] uppercase ml-1 mb-1">Projektziel</label><textarea id="f-goal" class="p-3 rounded-xl outline-none" placeholder="Was soll erreicht werden?"></textarea></div>
        <div class="flex justify-between mt-8">
            <button class="text-slate-500 uppercase text-xs font-bold" onclick="back()">Zurück</button>
            <button class="bg-blue-600 px-8 py-3 rounded-xl font-heavy uppercase tracking-widest" onclick="next()">Weiter</button>
        </div>
      </div>

      <div class="step" id="s2">
        <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-2 block">Phase 03</span>
        <h2 class="text-2xl font-heavy uppercase mb-6">Umfang</h2>
        <div class="flex flex-col mb-4"><label class="text-[10px] uppercase ml-1 mb-1">Was wird geliefert?</label><textarea id="f-scope" class="p-3 rounded-xl outline-none" placeholder="Leistungen definieren..."></textarea></div>
        <div class="grid grid-cols-2 gap-4">
            <div class="flex flex-col"><label class="text-[10px] uppercase ml-1 mb-1">Deadline</label><input type="date" id="f-deadline" class="p-3 rounded-xl outline-none"></div>
            <div class="flex flex-col"><label class="text-[10px] uppercase ml-1 mb-1">Revisionen</label><select id="f-revisions" class="p-3 rounded-xl outline-none"><option>1</option><option selected>2</option><option>3</option></select></div>
        </div>
        <div class="flex justify-between mt-8">
            <button class="text-slate-500 uppercase text-xs font-bold" onclick="back()">Zurück</button>
            <button class="bg-blue-600 px-8 py-3 rounded-xl font-heavy uppercase tracking-widest" onclick="next()">Weiter</button>
        </div>
      </div>

      <div class="step" id="s3">
        <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-2 block">Phase 04</span>
        <h2 class="text-2xl font-heavy uppercase mb-6">Investment</h2>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="flex flex-col"><label class="text-[10px] uppercase ml-1 mb-1">Budget (€)</label><input type="number" id="f-budget" class="p-3 rounded-xl outline-none" placeholder="2500"></div>
            <div class="flex flex-col"><label class="text-[10px] uppercase ml-1 mb-1">Zahlung</label><select id="f-payment" class="p-3 rounded-xl outline-none"><option>50/50</option><option>100% vorab</option><option>Nach Meilenstein</option></select></div>
        </div>
        <div class="flex flex-col"><label class="text-[10px] uppercase ml-1 mb-1">No-Go's</label><input type="text" id="f-dontlike" class="p-3 rounded-xl outline-none" placeholder="Was vermeiden?"></div>
        <div class="flex justify-between mt-8">
            <button class="text-slate-500 uppercase text-xs font-bold" onclick="back()">Zurück</button>
            <button class="bg-blue-600 px-8 py-3 rounded-xl font-heavy uppercase tracking-widest" onclick="next()">Zusammenfassung</button>
        </div>
      </div>

      <div class="step" id="s4">
        <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-2 block">Final Output</span>
        <h2 class="text-2xl font-heavy uppercase mb-6">Das Briefing</h2>
        <div id="summary" class="space-y-4 text-sm border-t border-white/10 pt-4"></div>
        <button class="w-full mt-8 bg-white text-black p-4 rounded-xl font-heavy uppercase tracking-widest hover:bg-slate-200 transition" onclick="copyBriefing()">Briefing kopieren</button>
        <p id="copy-msg" class="text-center text-[10px] mt-2 uppercase text-blue-400"></p>
        <div class="flex justify-center mt-6">
            <button class="text-slate-500 uppercase text-[10px] font-bold tracking-widest" onclick="resetForm()">Neustart</button>
        </div>
      </div>

    </div>
  </main>

  <script>
    let step = 0;
    const total = 5;
    const tags = {};

    function toggleTag(el, group) {
      tags[group] = tags[group] || [];
      if (el.classList.contains('selected')) {
        el.classList.remove('selected');
        tags[group] = tags[group].filter(t => t !== el.textContent);
      } else {
        el.classList.add('selected');
        tags[group].push(el.textContent);
      }
    }

    function setStep(n) {
      document.getElementById('s' + step).classList.remove('active');
      step = n;
      document.getElementById('s' + step).classList.add('active');

      for (let i = 0; i < total; i++) {
        const seg = document.getElementById('p' + i);
        seg.className = 'prog-seg h-1 flex-1 rounded-full' + (i < step ? ' done' : i === step ? ' active' : '');
      }
      if (step === 4) buildSummary();
    }

    function next() { if (step < total - 1) setStep(step + 1); }
    function back() { if (step > 0) setStep(step - 1); }

    function val(id) {
      const el = document.getElementById(id);
      return el ? (el.value.trim() || '—') : '—';
    }

    function buildSummary() {
      const sections = [
        { title: 'Kunde', data: [val('f-name'), val('f-contact')] },
        { title: 'Projekt', data: [(tags['type'] || []).join(', '), val('f-goal')] },
        { title: 'Umfang', data: [val('f-scope'), 'Deadline: ' + val('f-deadline')] }
      ];

      document.getElementById('summary').innerHTML = sections.map(s => `
        <div>
          <div class="text-blue-500 text-[10px] font-black uppercase mb-1">${s.title}</div>
          <div class="text-slate-300">${s.data.join(' // ')}</div>
        </div>
      `).join('');
    }

    function copyBriefing() {
      const text = `PROJEKT BRIEFING\nKunde: ${val('f-name')}\nZiel: ${val('f-goal')}\nUmfang: ${val('f-scope')}\nDeadline: ${val('f-deadline')}`;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copy-msg').textContent = "In die Zwischenablage kopiert!";
        setTimeout(() => document.getElementById('copy-msg').textContent = "", 2000);
      });
    }

    function resetForm() {
      location.reload();
    }
  </script>
</body>
</html>
