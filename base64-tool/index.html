<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="google-site-verification" content="ZwbquvhC72rPppjQTqD4b8wBaDw97MHKdKSgCG3LMXI" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4JVNJKQYCG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4JVNJKQYCG');
    </script>
    
    <title>Base64 Encoder & Decoder | ToolCompass</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <header class="bg-white shadow-sm py-4"><div class="container mx-auto px-4"><a href="/" class="text-blue-600 font-bold">← Back</a></div></header>
    <main class="container mx-auto px-4 py-10 max-w-2xl">
        <h1 class="text-3xl font-extrabold mb-6">Base64 Tool</h1>
        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <textarea id="baseInput" rows="5" class="w-full p-4 border rounded-xl mb-4 font-mono text-sm outline-none" placeholder="Enter text or base64 here..."></textarea>
            <div class="flex space-x-2 mb-6">
                <button onclick="encode()" class="flex-1 bg-gray-800 text-white font-bold py-3 rounded-lg hover:bg-black transition">Encode</button>
                <button onclick="decode()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-3 rounded-lg hover:bg-gray-300 transition">Decode</button>
            </div>
            <div id="baseOutputContainer" class="hidden">
                <p class="text-xs font-bold text-gray-400 mb-2 uppercase">Result:</p>
                <textarea id="baseOutput" readonly rows="5" class="w-full p-4 bg-gray-50 border rounded-xl font-mono text-sm"></textarea>
            </div>
        </div>
    </main>
    <script>
        function encode() {
            const input = document.getElementById('baseInput').value;
            document.getElementById('baseOutput').value = btoa(input);
            document.getElementById('baseOutputContainer').classList.remove('hidden');
        }
        function decode() {
            const input = document.getElementById('baseInput').value;
            try {
                document.getElementById('baseOutput').value = atob(input);
                document.getElementById('baseOutputContainer').classList.remove('hidden');
            } catch(e) { alert("Invalid Base64 string"); }
        }
    </script>
</body>
</html>
