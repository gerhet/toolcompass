  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Project Constants */
      --bg: #0D0D0D;
      --surface: #161616;
      --surface2: #1E1E1E;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #F0EDE8;
      --muted: #6B6760;
      --accent: #E8D5A3;
      
      /* Tool Specific Accents (Indigo/Purple for Time/Mystery) */
      --content: #818CF8;
      --content-bg: rgba(129, 140, 248, 0.07);
      --content-border: rgba(129, 140, 248, 0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain Overlay */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky; top: 0; z-index: 100;
      padding: 0 2rem;
      background: rgba(13,13,13,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 900px; margin: 0 auto;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--muted); text-decoration: none;
      font-size: 13px; font-weight: 500; transition: color .2s; padding: 6px 0;
    }
    .back-btn:hover { color: var(--text); }
    .back-arrow { font-size: 16px; transition: transform .2s; }
    .back-btn:hover .back-arrow { transform: translateX(-3px); }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 15px; color: var(--text);
    }
    .logo-text em { color: var(--accent); font-style: normal; }

    /* ─── MAIN ─── */
    main { max-width: 900px; margin: 0 auto; padding: 3rem 2rem 6rem; }

    /* ─── PAGE HEADER ─── */
    .page-header {
      text-align: center; margin-bottom: 2.5rem;
      animation: fadeUp .7s ease both;
    }
    .page-tag {
      display: inline-flex; align-items: center; gap: 7px;
      border: 1px solid var(--border-hover); border-radius: 40px;
      padding: 5px 14px; font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); margin-bottom: 1.5rem;
    }
    .page-tag-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--content); }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 900; line-height: .95;
      letter-spacing: -.025em; margin-bottom: 1rem;
    }
    .page-header h1 em { font-style: italic; color: var(--accent); font-weight: 700; }
    .page-sub { font-size: 15px; color: var(--muted); font-weight: 300; }

    /* ─── AD SLOT ─── */
    .ad-slot { margin-bottom: 1rem; display: none; }
    .ad-slot.adsense-active { display: block; }
    .ad-inner {
      background: rgba(255,255,255,.02); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      min-height: 90px; position: relative;
    }
    .ad-label {
      position: absolute; top: 6px; left: 10px;
      font-size: 9px; color: var(--muted); letter-spacing: .1em;
      text-transform: uppercase; opacity: .4;
    }

    /* ─── CALCULATOR CARD ─── */
    .calc-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2rem;
      margin-bottom: 1.5rem;
      animation: fadeUp .7s .1s ease both;
    }

    /* Date Input */
    .input-group { margin-bottom: 1.5rem; }
    .input-group label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 0.5rem;
    }
    .input-wrapper { position: relative; }
    input[type="date"] {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem;
      color: var(--text); font-family: 'Outfit', sans-serif;
      font-size: 16px; outline: none;
      transition: border-color .2s;
    }
    input[type="date"]:focus { border-color: var(--content); }
    /* Dark mode date picker fix */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    /* Age Display Grid */
    .age-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 600px) { .age-grid { grid-template-columns: 1fr; } }
    
    .age-card {
      background: var(--content-bg); border: 1px solid var(--content-border);
      border-radius: 16px; padding: 1.5rem; text-align: center;
    }
    .age-label {
      font-size: 11px; font-weight: 600; color: var(--content);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 0.5rem;
    }
    .age-value {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem); font-weight: 900;
      color: var(--text); line-height: 1;
    }

    /* Live Stats */
    .live-stats {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem;
      margin-bottom: 1.5rem; text-align: center;
    }
    .live-title {
      font-size: 12px; color: var(--muted);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 1rem;
    }
    .live-timer {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem; font-weight: 600; color: var(--accent);
    }

    /* Fun Facts Grid */
    .facts-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 600px) { .facts-grid { grid-template-columns: 1fr; } }
    
    .fact-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .fact-icon { font-size: 24px; }
    .fact-info { flex: 1; }
    .fact-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
    .fact-value { font-size: 14px; font-weight: 600; color: var(--text); }

    /* Next Birthday */
    .birthday-card {
      background: linear-gradient(135deg, var(--content-bg), transparent);
      border: 1px solid var(--content-border);
      border-radius: 16px; padding: 1.5rem; text-align: center;
      margin-bottom: 1.5rem;
    }
    .birthday-title {
      font-size: 12px; color: var(--content);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 0.5rem;
    }
    .birthday-countdown {
      font-family: 'Playfair Display', serif;
      font-size: 2rem; font-weight: 900; color: var(--text);
    }
    .birthday-sub { font-size: 13px; color: var(--muted); margin-top: 0.5rem; }

    /* Action Buttons */
    .action-row {
      display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center;
      margin-bottom: 1.5rem;
    }
    .action-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.75rem 1.25rem;
      font-size: 13px; font-weight: 500; color: var(--text);
      cursor: pointer; transition: all .2s;
      font-family: 'Outfit', sans-serif;
      display: flex; align-items: center; gap: 8px;
    }
    .action-btn:hover { border-color: var(--content); color: var(--content); }
    .action-btn.primary {
      background: var(--content); border-color: var(--content);
      color: #000; font-weight: 600;
    }
    .action-btn.primary:hover { background: var(--accent); }

    /* ─── HISTORY ─── */
    .history-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .history-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .history-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 700; font-style: italic;
      color: var(--text);
    }
    .history-clear {
      font-size: 11px; color: var(--muted);
      cursor: pointer; transition: color .2s;
    }
    .history-clear:hover { color: var(--danger); }
    .history-list {
      display: flex; flex-direction: column; gap: 0.5rem;
      max-height: 200px; overflow-y: auto;
    }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem; background: var(--surface2);
      border-radius: 8px; font-size: 12px;
    }
    .history-date { color: var(--muted); }
    .history-age { font-weight: 600; color: var(--content); }
    .history-delete {
      font-size: 14px; color: var(--muted); cursor: pointer;
      transition: color .2s;
    }
    .history-delete:hover { color: var(--danger); }

    /* ─── OTHER TOOLS ─── */
    .other-tools { margin-bottom: 1rem; animation: fadeUp .7s .3s ease both; }
    .other-tools-header {
      font-size: 11px; font-weight: 500; color: var(--muted);
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: .75rem;
    }
    .other-tools-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }
    .tool-chip {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: .85rem 1rem;
      text-decoration: none; color: var(--text);
      font-size: 12px; font-weight: 500;
      transition: border-color .2s, background .2s, transform .2s;
    }
    .tool-chip:hover { border-color: var(--border-hover); background: var(--surface2); transform: translateY(-2px); }
    .tool-chip-icon { font-size: 18px; flex-shrink: 0; }
    .tool-chip-info { min-width: 0; }
    .tool-chip-name { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tool-chip-desc { font-size: 10px; color: var(--muted); margin-top: 1px; }

    /* ─── SEO CONTENT ─── */
    .seo-content {
      padding: 2.5rem 0 0;
      border-top: 1px solid var(--border);
      animation: fadeUp .7s .4s ease both;
    }
    .seo-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 700; font-style: italic;
      color: var(--text); margin-bottom: 1rem;
    }
    .seo-content h2 em { color: var(--accent); }
    .seo-content p {
      font-size: 13.5px; color: var(--muted); font-weight: 300;
      line-height: 1.8; margin-bottom: 1rem;
    }
    .seo-content strong { color: var(--text); font-weight: 500; }
    
    .seo-list { list-style: none; margin-bottom: 1.5rem; }
    .seo-list li {
      position: relative; padding-left: 1.5rem; margin-bottom: 0.75rem;
      font-size: 13.5px; color: var(--muted); font-weight: 300; line-height: 1.6;
    }
    .seo-list li::before {
      content: '•'; position: absolute; left: 0; color: var(--content);
      font-size: 1.2rem; line-height: 1;
    }

    /* FAQ */
    .faq-list { margin-top: 1.5rem; }
    .faq-item { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
    .faq-q {
      width: 100%; background: var(--surface); border: none; color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
      padding: 1rem 1.25rem; text-align: left; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center; gap: 1rem;
      transition: background .2s;
    }
    .faq-q:hover { background: var(--surface2); }
    .faq-icon { font-size: 18px; color: var(--accent); transition: transform .3s; flex-shrink: 0; }
    .faq-item.open .faq-icon { transform: rotate(45deg); }
    .faq-a { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
    .faq-item.open .faq-a { max-height: 300px; }
    .faq-a-inner { padding: .25rem 1.25rem 1rem; font-size: 13px; color: var(--muted); font-weight: 300; line-height: 1.7; }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 2rem; text-align: center;
      max-width: 900px; margin: 0 auto;
    }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; margin-bottom: .75rem; }
    .footer-logo em { color: var(--accent); font-style: italic; }
    .footer-copy { font-size: 11px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; opacity: .4; }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    @media (max-width: 480px) {
      main { padding: 2rem 1.25rem 5rem; }
    }
