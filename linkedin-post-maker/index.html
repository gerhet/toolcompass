<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Post Maker | ToolCompass</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans text-sm">
    <header class="bg-white shadow-sm py-4">
        <div class="container mx-auto px-4"><a href="/" class="text-blue-600 font-bold">← Back to ToolCompass</a></div>
    </header>
    <main class="container mx-auto px-4 py-10 max-w-2xl">
        <h1 class="text-3xl font-extrabold mb-2 text-center">LinkedIn Post Maker</h1>
        <p class="text-gray-600 mb-8 text-center">Transform your thoughts into professional, high-engagement posts.</p>
        <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
            <textarea id="postInput" rows="6" class="w-full p-4 border rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="What's on your mind? Type your raw ideas here..."></textarea>
            <button onclick="makePost()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mb-6">Format for LinkedIn 🚀</button>
            <div id="outputContainer" class="hidden p-6 bg-gray-50 rounded-xl border border-gray-200 relative">
                <p id="postOutput" class="whitespace-pre-wrap text-gray-800 leading-relaxed"></p>
                <button onclick="copyPost()" class="mt-4 text-blue-600 font-bold hover:underline">Copy Post</button>
            </div>
        </div>
        <article class="mt-12 prose text-gray-700">
            <h2 class="text-xl font-bold">Why Post Structure Matters</h2>
            <p>On LinkedIn, the first three lines are crucial. Our tool helps you break up text for better readability and adds professional emojis to highlight key points.</p>
        </article>
    </main>
    <script>
        function makePost() {
            const input = document.getElementById('postInput').value;
            if(!input) return;
            let formatted = "🚀 QUICK THOUGHT:\n\n" + input.replace(/\n/g, "\n\n") + "\n\n---\n💡 What are your thoughts?\n#networking #growth #professional";
            document.getElementById('postOutput').innerText = formatted;
            document.getElementById('outputContainer').classList.remove('hidden');
        }
        function copyPost() {
            navigator.clipboard.writeText(document.getElementById('postOutput').innerText);
            alert("Ready to paste on LinkedIn!");
        }
    </script>
</body>
</html>
