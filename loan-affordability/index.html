<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="google-site-verification" content="ZwbquvhC72rPppjQTqD4b8wBaDw97MHKdKSgCG3LMXI" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4JVNJKQYCG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4JVNJKQYCG');
    </script>
    
    <title>Loan Affordability Calculator | ToolCompass</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <header class="bg-white shadow-sm py-4"><div class="container mx-auto px-4"><a href="/" class="text-blue-600 font-bold">← Back</a></div></header>
    <main class="container mx-auto px-4 py-10 max-w-xl">
        <h1 class="text-3xl font-extrabold mb-6 text-center">Home Affordability</h1>
        <div class="bg-white p-8 rounded-2xl shadow-xl space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-400 uppercase mb-1 text-xs">Monthly Budget ($)</label>
                <input type="number" id="monthly" value="1500" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-400 uppercase mb-1 text-xs">Interest Rate (%)</label>
                    <input type="number" id="rate" value="4.5" step="0.1" class="w-full p-3 border rounded-lg outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-400 uppercase mb-1 text-xs">Term (Years)</label>
                    <input type="number" id="years" value="30" class="w-full p-3 border rounded-lg outline-none">
                </div>
            </div>
            <button onclick="calcLoan()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">Estimate Max Loan</button>
            <div id="res" class="hidden mt-6 text-center p-6 bg-blue-50 rounded-xl border border-blue-100">
                <p class="text-xs font-bold text-blue-800 uppercase tracking-widest">You can afford a loan of approx.</p>
                <p id="loanMax" class="text-4xl font-black text-blue-600 mt-2">$0</p>
            </div>
        </div>
    </main>
    <script>
        function calcLoan() {
            const P = parseFloat(document.getElementById('monthly').value);
            const r = parseFloat(document.getElementById('rate').value) / 100 / 12;
            const n = parseFloat(document.getElementById('years').value) * 12;
            if(!P || !r || !n) return;
            const max = P * (Math.pow(1 + r, n) - 1) / (r * Math.pow(1 + r, n));
            document.getElementById('loanMax').innerText = "$" + Math.round(max).toLocaleString();
            document.getElementById('res').classList.remove('hidden');
        }
    </script>
</body>
</html>
