<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI-Chat mit Puter.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .new-chat-btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .new-chat-btn:hover {
            background: white;
            color: #667eea;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f7f8;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
        }

        #chat-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        #chat-input:focus {
            border-color: #667eea;
        }

        #send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        #send-btn:hover {
            transform: scale(1.05);
        }

        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: fit-content;
        }

        .typing-indicator.show {
            display: block;
        }

        .typing-indicator span {
            height: 8px;
            width: 8px;
            background: #667eea;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .welcome-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .welcome-message h2 {
            color: #667eea;
            margin-bottom: 10px;
        }
    </style>
    <script src="/assets/js/consent.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 KI-Chat</h1>
            <button class="new-chat-btn" onclick="startNewChat()">Neuer Chat</button>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="welcome-message">
                <h2>Willkommen!</h2>
                <p>Stelle mir eine Frage und ich werde dir antworten.</p>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input 
                    type="text" 
                    id="chat-input" 
                    placeholder="Schreibe eine Nachricht..."
                    onkeypress="handleKeyPress(event)"
                >
                <button id="send-btn" onclick="sendMessage()">Senden</button>
            </div>
        </div>
    </div>

    <script src="https://js.puter.com/v2/"></script>
    <script>
        let chatHistory = [];
        const STORAGE_KEY = 'puter_chat_history';

        // Lade gespeicherten Chat beim Start
        window.onload = function() {
            loadChatHistory();
            if (chatHistory.length > 0) {
                displayChatHistory();
            }
        };

        function loadChatHistory() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                chatHistory = JSON.parse(saved);
            }
        }

        function saveChatHistory() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
        }

        function displayChatHistory() {
            const messagesDiv = document.getElementById('chat-messages');
            messagesDiv.innerHTML = '';
            
            chatHistory.forEach(msg => {
                addMessageToUI(msg.role, msg.content);
            });
            
            scrollToBottom();
        }

        function addMessageToUI(role, content) {
            const messagesDiv = document.getElementById('chat-messages');
            
            // Entferne Willkommensnachricht
            const welcome = messagesDiv.querySelector('.welcome-message');
            if (welcome) welcome.remove();
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            scrollToBottom();
        }

        function showTypingIndicator() {
            const messagesDiv = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing-indicator';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'typing-indicator show';
            contentDiv.innerHTML = '<span></span><span></span><span></span>';
            
            typingDiv.appendChild(contentDiv);
            messagesDiv.appendChild(typingDiv);
            scrollToBottom();
        }

        function hideTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function scrollToBottom() {
            const messagesDiv = document.getElementById('chat-messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Deaktiviere Input und Button
            input.disabled = true;
            sendBtn.disabled = true;
            
            // Füge Benutzernachricht hinzu
            addMessageToUI('user', message);
            chatHistory.push({ role: 'user', content: message });
            
            // Leere Input
            input.value = '';
            
            // Zeige Ladeanimation
            showTypingIndicator();
            
            try {
                // Sende Anfrage an Puter.js KI mit Hermes-Modell
                const response = await puter.ai.chat(
                    chatHistory.map(msg => ({
                        role: msg.role,
                        content: msg.content
                    })),
                    { model: "qwen3-coder-plus" }
                );
                
                // Verstecke Ladeanimation
                hideTypingIndicator();
                
                // Füge KI-Antwort hinzu
                const aiResponse = response.message.content;
                addMessageToUI('assistant', aiResponse);
                chatHistory.push({ role: 'assistant', content: aiResponse });
                
                // Speichere Chat
                saveChatHistory();
                
            } catch (error) {
                hideTypingIndicator();
                addMessageToUI('assistant', 'Entschuldigung, es gab einen Fehler: ' + error.message);
                console.error('Fehler:', error);
            }
            
            // Aktiviere Input und Button wieder
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function startNewChat() {
            if (chatHistory.length > 0) {
                if (confirm('Möchtest du wirklich einen neuen Chat starten? Der aktuelle Chat wird gelöscht.')) {
                    chatHistory = [];
                    localStorage.removeItem(STORAGE_KEY);
                    document.getElementById('chat-messages').innerHTML = `
                        <div class="welcome-message">
                            <h2>Willkommen!</h2>
                            <p>Stelle mir eine Frage und ich werde dir antworten.</p>
                        </div>
                    `;
                }
            }
        }
    </script>
</body>
</html>
