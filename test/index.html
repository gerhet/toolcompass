<!DOCTYPE html>
<html>
<head>
    <title>Mein Qwen-Chat</title>
</head>
<body>
    <h1>Chat mit Qwen 3.5</h1>
    <div id="antwort"></div>
    <script src="https://js.puter.com/v2/"></script>
    <script>
        puter.ai.chat("Hallo, wie geht es dir?", {
            model: "qwen/qwen3.5-397b-a17b"
        }).then(response => {
            document.getElementById('antwort').innerHTML = response.message.content;
        });
    </script>
</body>
</html>
