<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen 3.6 Chat - Centered UI</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root { 
            --bg: #ffffff; 
            --chat-bg: #f9f9f9;
            --user-msg: #2f2f2f; 
            --ai-msg: #f0f0f0; 
            --text: #1a1a1a; 
            --max-width: 800px; /* Die Breite des Chats */
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            align-items: center; /* Zentriert den gesamten Inhalt */
        }

        /* Header */
        header { 
            width: 100%; 
            max-width: var(--max-width);
            padding: 20px; 
            text-align: left; 
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }

        /* Chat Bereich */
        #chat-container { 
            flex: 1; 
            width: 100%;
            max-width: var(--max-width);
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .message { 
            max-width: 85%; 
            padding: 14px 18px; 
            border-radius: 20px; 
            font-size: 16px; 
            line-height: 1.6; 
            word-wrap: break-word;
        }

        .user { 
            align-self: flex-end; 
            background-color: var(--user-msg); 
            color: white; 
        }

        .ai { 
            align-self: flex-start; 
            background-color: var(--ai-msg); 
            color: var(--text); 
        }

        /* Eingabebereich fixiert am Boden */
        #input-wrapper {
            width: 100%;
            max-width: var(--max-width);
            padding: 10px 20px 30px 20px;
            background: var(--bg);
        }

        #input-area { 
            display: flex; 
            background: #f0f0f0;
            border-radius: 30px;
            padding: 8px 15px;
            align-items: center;
            gap: 10px;
        }

        input { 
            flex: 1; 
            padding: 12px; 
            border: none; 
            background: transparent;
            outline: none; 
            font-size: 16px; 
            color: var(--text);
        }

        button { 
            background: #000; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            cursor: pointer; 
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        button:hover { transform: scale(1.05); }
        button:disabled { background-color: #ccc; }

        /* Scrollbar Styling */
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 10px; }
    </style>
</head>
<body>

<header>Qwen 3.6 Flash</header>

<div id="chat-container">
    <div class="message ai">Wie kann ich dir heute helfen?</div>
</div>

<div id="input-wrapper">
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Nachricht an Qwen..." autocomplete="off">
        <button id="send-btn">↑</button>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerText = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function handleChat() {
        const prompt = userInput.value.trim();
        if (!prompt) return;

        appendMessage('user', prompt);
        userInput.value = '';
        sendBtn.disabled = true;

        try {
            const response = await puter.ai.chat(prompt, { 
                model: 'qwen/qwen3.6-flash' 
            });
            appendMessage('ai', response);
        } catch (error) {
            appendMessage('ai', "Fehler: " + error.message);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleChat();
    });
</script>

</body>
</html>
