<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen 3.6 - Pro UI with Copy</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root { 
            --bg-color: #171717;       
            --user-msg: #2f2f2f;       
            --ai-msg: transparent;         
            --text-main: #ececec;      
            --text-muted: #b4b4b4;     
            --input-bg: #2f2f2f;       
            --max-width: 800px; 
            --accent: #4e4e4e;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0; display: flex; flex-direction: column; height: 100vh; align-items: center; 
        }

        header { width: 100%; max-width: var(--max-width); padding: 20px; font-size: 1rem; color: var(--text-muted); font-weight: 500; }

        #chat-container { 
            flex: 1; width: 100%; max-width: var(--max-width); overflow-y: auto; 
            padding: 20px; display: flex; flex-direction: column; gap: 30px; 
        }

        .message-wrapper { position: relative; display: flex; flex-direction: column; }

        .message { 
            max-width: 85%; padding: 10px 0; font-size: 16px; line-height: 1.6; word-wrap: break-word; position: relative;
        }

        .user { 
            align-self: flex-end; background-color: var(--user-msg); color: white; 
            padding: 12px 20px; border-radius: 18px; border: 1px solid #444;
        }

        .ai { align-self: flex-start; color: var(--text-main); width: 100%; }

        /* Kopier-Button Styling */
        .copy-btn {
            align-self: flex-start;
            background: #333;
            color: #ccc;
            border: 1px solid #444;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .copy-btn:hover { background: #444; color: #fff; }
        .copy-btn:active { transform: scale(0.95); }

        /* Eingabebereich */
        #input-wrapper { width: 100%; max-width: var(--max-width); padding: 10px 20px 40px 20px; }
        #input-area { 
            display: flex; background: var(--input-bg); border-radius: 16px; 
            padding: 6px 12px; align-items: center; gap: 10px; border: 1px solid #444;
        }

        input { flex: 1; padding: 14px; border: none; background: transparent; outline: none; color: white; font-size: 16px; }

        button#send-btn { 
            background: #fff; color: #000; border: none; border-radius: 12px; 
            width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* Scrollbar */
        #chat-container::-webkit-scrollbar { width: 5px; }
        #chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<header>Qwen 3.6 Flash</header>

<div id="chat-container">
    <div class="message-wrapper">
        <div class="message ai">Guten Tag. Ich bin bereit. Code oder Texte kann ich direkt für dich kopierbar machen.</div>
    </div>
</div>

<div id="input-wrapper">
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Nachricht an Qwen..." autocomplete="off">
        <button id="send-btn">↑</button>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(role, text) {
        const wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper';

        // Kopier-Button nur für KI hinzufügen
        if (role === 'ai') {
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.innerText = 'Kopieren';
            btn.onclick = () => {
                navigator.clipboard.writeText(text);
                btn.innerText = 'Kopiert!';
                setTimeout(() => btn.innerText = 'Kopieren', 2000);
            };
            wrapper.appendChild(btn);
        }

        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerText = text;
        
        wrapper.appendChild(msgDiv);
        chatContainer.appendChild(wrapper);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function handleChat() {
        const prompt = userInput.value.trim();
        if (!prompt) return;

        appendMessage('user', prompt);
        userInput.value = '';
        sendBtn.disabled = true;

        try {
            const response = await puter.ai.chat(prompt, { 
                model: 'qwen/qwen3.6-flash' 
            });
            appendMessage('ai', response);
        } catch (error) {
            appendMessage('ai', "Fehler: " + error.message);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', handleChat);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleChat();
    });
</script>

</body>
</html>
